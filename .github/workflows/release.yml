name: Create Release

on:
  push:
    branches:
      - main
    paths:
      - 'mmwave_vis/config.yaml'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from config.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' mmwave_vis/config.yaml | sed 's/version: *"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check tag does not already exist
        id: check_tag
        run: |
          if git tag | grep -qx "v${{ steps.version.outputs.version }}"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog section
        if: steps.check_tag.outputs.exists == 'false'
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract the block between this version's heading and the next
          BODY=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" mmwave_vis/CHANGELOG.md)
          # Pass multiline string to output safely
          {
            echo "body<<EOF_CHANGELOG"
            echo "$BODY"
            echo "EOF_CHANGELOG"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
